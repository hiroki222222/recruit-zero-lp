<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZERO TALENT | 逆転キャリアシナリオ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 'zt-blue': '#005BAC', 'line-green': '#28C000' },
                    fontFamily: { 'mont': ['Montserrat', 'sans-serif'], 'noto': ['Noto Sans JP', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Noto Sans JP', sans-serif; }
        .hero-gradient { background: linear-gradient(135deg, #005BAC 0%, #003e75 100%); }
        /* 本家風の斜めライン */
        .skew-bg { transform: skewY(-3deg); margin-top: -50px; }
        .skew-content { transform: skewY(3deg); }
    </style>
</head>
<body class="bg-white text-slate-900 overflow-x-hidden">

    <header class="sticky top-0 z-50 bg-white/90 backdrop-blur-md px-6 py-4 flex items-center justify-between border-b border-gray-100">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-zt-blue flex items-center justify-center text-white font-mont font-black text-xl rounded-sm italic">Z</div>
            <span class="text-lg font-black tracking-tighter text-zt-blue font-mont uppercase">ZERO TALENT</span>
        </div>
        <a href="#cta" class="bg-line-green text-white text-[10px] font-bold py-2 px-4 rounded-full shadow-lg">無料面談はこちら</a>
    </header>

    <section class="relative pt-20 pb-32 px-6 hero-gradient text-white overflow-hidden">
        <div class="max-w-4xl mx-auto relative z-10">
            <p class="text-sm font-bold tracking-widest mb-4 opacity-80 uppercase font-mont">Scenario for Success</p>
            <h2 class="text-4xl md:text-6xl font-black leading-tight mb-8 font-noto">
                ゼロタレから始まる、<br>
                <span class="text-white">あなただけの</span><br>
                <span class="bg-white text-zt-blue px-2 inline-block mt-2 transform -rotate-1">逆転キャリアシナリオ</span>
            </h2>
            <p class="text-base mb-10 opacity-90 leading-relaxed max-w-lg">
                学歴や職歴にとらわれず、10年後を見据えた"逆転シナリオ"を一緒に描きます。
            </p>
            <a href="#cta" class="bg-line-green text-white text-xl font-bold py-5 px-12 rounded-full inline-block shadow-2xl hover:scale-105 transition-transform w-full md:w-auto text-center">
                LINEで無料面談を予約する
            </a>
        </div>
        <div class="absolute -right-20 -bottom-20 text-[20rem] font-mont font-black opacity-10 italic select-none">Z</div>
    </section>

    <section class="bg-white py-20 px-6 relative skew-bg">
        <div class="skew-content max-w-6xl mx-auto">
            <h3 class="text-2xl md:text-4xl font-black text-zt-blue text-center mb-16 font-noto underline decoration-zt-blue/20 decoration-8 underline-offset-8">
                SCENARIOS <span class="text-slate-300 block text-sm mt-2 font-mont font-bold">キャリアの可能性</span>
            </h3>
            <div class="grid md:grid-cols-3 gap-8">
                <div class="group bg-white rounded-3xl shadow-xl overflow-hidden border border-gray-100 hover:-translate-y-2 transition-all">
                    <div class="h-48 bg-slate-200 relative overflow-hidden">
                        <img src="https://images.unsplash.com/photo-1519085360753-af0119f7cbe7?auto=format&fit=crop&q=80&w=400" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500">
                        <div class="absolute top-4 left-4 bg-zt-blue text-white text-[10px] px-3 py-1 font-bold">BUSINESS</div>
                    </div>
                    <div class="p-6">
                        <h4 class="font-bold text-lg mb-2">ハイクラス「ビジネスマン」</h4>
                        <p class="text-xs text-slate-500 leading-relaxed italic">未経験から、市場価値の高いリーダー層へ。</p>
                    </div>
                </div>
                </div>
        </div>
    </section>

    <footer id="cta" class="py-24 px-6 bg-slate-50 text-center border-t border-gray-100">
        <div class="max-w-2xl mx-auto">
            <h2 class="text-3xl font-black mb-10 text-zt-blue leading-tight">
                過去ではなく、"これから"を。<br>
                まずはLINEで相談。
            </h2>
            <a href="#" class="bg-line-green text-white text-2xl font-bold py-6 px-12 rounded-full inline-block shadow-2xl w-full">
                LINEで無料面談
            </a>
            <p class="mt-12 text-[10px] text-slate-400 font-mont font-bold">© 2025 ZERO TALENT ALL RIGHTS RESERVED.</p>
        </div>
    </footer>

</body>
</html>
